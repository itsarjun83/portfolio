name: Azure Container Apps CI/CD

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout code
      - name: Checkout repository
        uses: actions/checkout@v4

      # Step 2: Login to Azure
      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      # Step 3: Login to ACR
      - name: ACR Login
        run: |
          az acr login --name myportfolioacr12345

      # Step 4: Build Docker image
      - name: Build Docker Image
        run: |
          docker build -t myportfolioacr12345.azurecr.io/my-website:${{ github.sha }} .

      # Step 5: Push image to ACR
      - name: Push Docker Image
        run: |
          docker push myportfolioacr12345.azurecr.io/my-website:${{ github.sha }}

      # Step 6: Deploy to Azure Container App
      - name: Deploy to Azure Container App
        run: |
          az containerapp update \
            --name portfolio-app \
            --resource-group portfolio-rg \
            --image myportfolioacr12345.azurecr.io/my-website:${{ github.sha }}

name: Azure Container Apps Deploy

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Build Docker image
        run: |
          docker build -t myportfolioacr12345.azurecr.io/my-website:v1 .

      - name: Push Docker image
        run: |
          echo ${{ secrets.ACR_PASSWORD }} | docker login myportfolioacr12345.azurecr.io -u ${{ secrets.ACR_USERNAME }} --password-stdin
          docker push myportfolioacr12345.azurecr.io/my-website:v1

      - name: Update Azure Container App
        run: |
          az containerapp update \
            --name portfolio-app \
            --resource-group portfolio-rg \
            --image myportfolioacr12345.azurecr.io/my-website:v1
